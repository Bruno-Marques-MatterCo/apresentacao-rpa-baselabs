<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BASE/labs — Automação Inteligente de Processos (RPA + IA)</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #1a3a6e;
  --blue-light: #2a5298;
  --blue-dark: #0f2347;
  --lime: #c5e03c;
  --lime-dark: #9ab82e;
  --white: #ffffff;
  --gray-bg: #f5f5f5;
  --gray-text: #555;
  --gray-light: #e8e8e8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'SF Pro Display', -apple-system, sans-serif; background: var(--gray-bg); color: #333; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(26,58,110,0.2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(26,58,110,0.4); }

/* ── Header ── */
.app-header {
  background: var(--white);
  border-bottom: 3px solid var(--blue);
  padding: 0 clamp(16px,3vw,32px);
  display: flex; align-items: center; height: 60px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.logo {
  font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 1.1rem;
  color: var(--blue); display: flex; align-items: center; gap: 8px; margin-right: 32px; flex-shrink: 0;
}
.logo-bar { width: 8px; height: 24px; background: var(--blue); border-radius: 2px; }
.logo span { font-weight: 400; }
nav { display: flex; gap: 2px; overflow: auto; flex: 1; }
nav button {
  background: transparent; color: var(--blue-dark); border: none; padding: 8px 14px;
  border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: 600;
  white-space: nowrap; transition: all 0.25s; font-family: inherit;
}
nav button.active { background: var(--blue); color: var(--white); }
nav button:hover:not(.active) { background: rgba(26,58,110,0.07); }

/* ── Main ── */
main {
  flex: 1; padding: clamp(20px,4vw,40px) clamp(16px,4vw,48px);
  max-width: 1100px; margin: 0 auto; width: 100%;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Footer ── */
footer {
  background: var(--blue-dark); color: rgba(255,255,255,0.5);
  text-align: center; padding: 16px; font-size: 0.78rem;
}

/* ── Typography ── */
.section-title {
  font-family: 'JetBrains Mono', monospace; font-size: clamp(1.6rem,4vw,2.6rem);
  color: var(--blue); margin-bottom: 12px; font-weight: 700; letter-spacing: -0.5px;
}
.section-sub { font-size: 1.05rem; color: var(--gray-text); line-height: 1.7; max-width: 800; margin-bottom: 32px; }

/* ── Cards ── */
.card {
  background: var(--white); border-radius: 14px; padding: 28px 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: all 0.35s ease;
}
.card.hover:hover { box-shadow: 0 12px 40px rgba(26,58,110,0.18); transform: translateY(-4px); }
.card.clickable { cursor: pointer; }

/* ── Badge ── */
.badge {
  display: inline-block; padding: 4px 14px; border-radius: 20px;
  font-size: 0.78rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--white);
}

/* ── Animations ── */
@keyframes fadeSlideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse {
  0%,100% { box-shadow: 0 4px 20px rgba(197,224,60,0.3); }
  50% { box-shadow: 0 4px 30px rgba(197,224,60,0.55), 0 0 0 8px rgba(197,224,60,0.15); }
}
.fade-in { animation: fadeIn 0.6s ease both; }
.fade-in-delay-1 { animation: fadeIn 0.6s ease 0.1s both; }
.fade-in-delay-2 { animation: fadeIn 0.6s ease 0.2s both; }
.fade-in-delay-3 { animation: fadeIn 0.6s ease 0.3s both; }

/* ── Hero ── */
.hero {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 60%, var(--blue-light) 100%);
  border-radius: 20px; padding: clamp(32px,6vw,60px) clamp(24px,4vw,48px);
  color: var(--white); margin-bottom: 40px; position: relative; overflow: hidden;
}
.hero-circle-1 { position:absolute; right:-60px; top:-60px; width:260px; height:260px; background:var(--lime); opacity:0.08; border-radius:50%; }
.hero-circle-2 { position:absolute; left:30%; bottom:-30px; width:180px; height:180px; background:var(--lime); opacity:0.05; border-radius:50%; }
.hero h1 {
  font-family: 'JetBrains Mono', monospace; font-size: clamp(2rem,5vw,3.4rem);
  font-weight: 800; margin: 20px 0 16px; line-height: 1.1;
}
.hero p { font-size: 1.15rem; opacity: 0.85; max-width: 600; line-height: 1.6; }
.hero-date { display:inline-block; margin-top:20px; background:var(--lime); color:var(--blue-dark); padding:6px 18px; border-radius:8px; font-weight:700; font-size:0.85rem; }

/* ── Grid helpers ── */
.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
@media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }

/* ── Team card ── */
.team-avatar {
  width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 14px;
  background: linear-gradient(135deg, var(--blue), var(--blue-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; font-weight: 700; color: var(--white);
}
.team-name { font-size: 1.1rem; color: var(--blue-dark); margin-bottom: 4px; font-weight: 700; }
.team-role { font-size: 0.82rem; color: var(--lime-dark); font-weight: 700; margin-bottom: 10px; }
.team-bio { font-size: 0.85rem; color: var(--gray-text); line-height: 1.55; }
.team-link {
  display: inline-block; margin-top: 12px; font-size: 0.8rem; color: var(--blue); font-weight: 600;
  text-decoration: none; padding: 6px 14px; border: 1px solid rgba(26,58,110,0.2); border-radius: 8px;
  transition: all 0.2s;
}
.team-link:hover { background: var(--blue); color: var(--white); }

/* ── Ecosystem ── */
.eco-container {
  position: relative; width: 100%; max-width: 900px; margin: 0 auto; height: 420px;
  background: linear-gradient(135deg, var(--gray-bg), #eef1f6); border-radius: 20px; overflow: hidden;
}
.eco-node {
  position: absolute; display: flex; flex-direction: column; align-items: center; gap: 4px;
  opacity: 0; transform: scale(0.3); transition: all 0.5s ease;
}
.eco-node.visible { opacity: 1; transform: scale(1); }
.eco-dot { width: 18px; height: 18px; border-radius: 50%; background: var(--blue); box-shadow: 0 2px 8px rgba(26,58,110,0.35); }
.eco-label { font-size: 0.72rem; font-weight: 600; color: var(--blue-dark); white-space: nowrap; background: rgba(255,255,255,0.85); padding: 2px 8px; border-radius: 6px; }
.eco-center {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  cursor: pointer; text-align: center; z-index: 10;
}
.eco-matter {
  width: 110px; height: 110px; border-radius: 50%;
  background: radial-gradient(circle, var(--lime), var(--lime-dark));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(197,224,60,0.3);
  transition: all 0.5s ease; animation: pulse 2.5s ease-in-out infinite;
}
.eco-matter.expanded { animation: none; box-shadow: 0 0 0 12px rgba(197,224,60,0.25), 0 8px 30px rgba(197,224,60,0.4); }
.eco-matter span { font-weight: 800; font-size: 0.9rem; color: var(--blue-dark); }
.eco-hint { margin-top: 8px; font-size: 0.75rem; color: var(--gray-text); font-weight: 500; }

/* ── Client categories ── */
.cat-header {
  display: flex; align-items: center; gap: 12px; padding: 14px 20px;
  border-radius: 12px; cursor: pointer; transition: all 0.35s ease;
  font-weight: 700; font-size: 1rem; margin-bottom: 4px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.cat-header:hover { filter: brightness(0.97); }
.cat-arrow { transition: transform 0.3s; font-size: 1.2rem; }
.cat-arrow.open { transform: rotate(90deg); }
.cat-count { margin-left: auto; opacity: 0.7; font-size: 0.82rem; font-weight: 500; }
.cat-items { max-height: 0; overflow: hidden; transition: max-height 0.45s ease; }
.cat-items.open { max-height: 300px; }
.cat-items-inner { display: flex; flex-wrap: wrap; gap: 10px; padding: 14px 8px 8px; }
.cat-chip {
  display: inline-block; padding: 8px 16px; border-radius: 10px;
  font-size: 0.88rem; font-weight: 600;
}

/* ── Timeline ── */
.timeline { position: relative; padding-left: 40px; margin-top: 20px; }
.timeline-line {
  position: absolute; left: 18px; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(to bottom, var(--blue), var(--lime)); border-radius: 3px;
}
.timeline-item { position: relative; margin-bottom: 24px; cursor: pointer; }
.timeline-dot {
  position: absolute; left: -32px; top: 18px; width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; transition: all 0.3s; z-index: 2; border-width: 3px; border-style: solid;
}
.timeline-details { max-height: 0; overflow: hidden; transition: max-height 0.45s ease, margin 0.3s; }
.timeline-details.open { max-height: 250px; margin-top: 16px; }
.timeline-tag {
  display: inline-block; padding: 6px 14px; border-radius: 8px;
  font-size: 0.82rem; font-weight: 600; margin: 3px;
}
.timeline-toggle { font-size: 0.75rem; margin-top: 10px; opacity: 0.7; font-weight: 600; }

/* ── McKinsey stat ── */
.mckinsey-box {
  background: linear-gradient(135deg, var(--blue-dark), var(--blue));
  border-radius: 18px; padding: 40px 32px; color: var(--white); text-align: center; margin-top: 24px;
}
.mckinsey-num {
  font-family: 'JetBrains Mono', monospace; font-size: clamp(3rem,8vw,5rem);
  font-weight: 900; color: var(--lime);
}

/* ── Cases ── */
.case-card { border-top: 4px solid var(--blue); transition: all 0.3s; }
.case-section-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
.case-result-chip {
  display: inline-block; background: rgba(26,58,110,0.07); color: var(--blue-dark);
  padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 500; margin: 3px;
}
.case-detail { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; }
.case-detail.open { max-height: 800px; }

/* ── Mini chart ── */
.chart-bar { height: 18px; border-radius: 4px; transition: width 1s ease; min-width: 20px; }
.chart-label { font-size: 0.72rem; font-weight: 700; }

/* ── Stats row ── */
.stat-box { text-align: center; padding: 16px 10px; }
.stat-value { font-family: 'JetBrains Mono', monospace; font-size: clamp(1.8rem,4vw,2.4rem); font-weight: 800; line-height: 1; }
.stat-label { font-size: 0.85rem; color: var(--gray-text); margin-top: 6px; }

/* ── Stat cards top ── */
.stat-card-top {
  text-align: center; padding: 28px 24px; border-radius: 14px; color: var(--white);
}
.stat-card-top .num { font-family: 'JetBrains Mono', monospace; font-size: 2.4rem; font-weight: 900; }
.stat-card-top .lbl { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; }

/* ── RPA steps ── */
.rpa-steps { display: flex; gap: 0; align-items: flex-start; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
.rpa-step { flex: 1; min-width: 140px; display: flex; flex-direction: column; align-items: center; position: relative; }
.rpa-step-icon {
  width: 64px; height: 64px; border-radius: 50%; background: var(--blue); color: var(--white);
  display: flex; align-items: center; justify-content: center; font-size: 1.6rem; position: relative; z-index: 2;
}
.rpa-step-connector { position: absolute; top: 30px; left: 60%; width: 80%; height: 3px; background: var(--lime); z-index: 1; }
.rpa-step-title { font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; font-weight: 700; color: var(--blue-dark); margin-top: 10px; }
.rpa-step-desc { font-size: 0.78rem; color: var(--gray-text); text-align: center; margin-top: 4px; }

/* ── Side by side lists ── */
.side-list-item { padding: 16px 18px; display: flex; gap: 10px; align-items: flex-start; }
.side-list-item .icon { font-size: 1.3rem; flex-shrink: 0; }
.side-list-item .title { font-weight: 700; font-size: 0.92rem; color: var(--blue-dark); }
.side-list-item .desc { font-size: 0.82rem; color: var(--gray-text); margin-top: 2px; }

/* ── Flow animation ── */
.flow-steps { display: flex; gap: 0; align-items: flex-start; justify-content: center; flex-wrap: wrap; }
.flow-step { display: flex; align-items: center; }
.flow-node { display: flex; flex-direction: column; align-items: center; width: 110px; text-align: center; transition: all 0.4s ease; }
.flow-circle {
  width: 60px; height: 60px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; transition: all 0.4s ease; border: 3px solid transparent;
}
.flow-circle.active { border-width: 3px; border-style: solid; }
.flow-connector { width: 30px; height: 3px; border-radius: 2px; margin-top: -20px; transition: background 0.4s; }
.flow-label { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; font-weight: 700; margin-top: 8px; }
.flow-desc { font-size: 0.7rem; color: var(--gray-text); margin-top: 3px; min-height: 32px; }

/* ── Agent capabilities ── */
.cap-sidebar { display: flex; flex-direction: column; gap: 8px; }
.cap-btn {
  padding: 14px 16px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.9rem;
  transition: all 0.3s; display: flex; align-items: center; gap: 8px;
  border: none; text-align: left; font-family: inherit;
}
.cap-btn.active { background: var(--blue); color: var(--white); box-shadow: 0 4px 16px rgba(26,58,110,0.3); }
.cap-btn:not(.active) { background: var(--white); color: var(--blue-dark); box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.cap-detail-icon { font-size: 2rem; margin-bottom: 12px; }
.cap-detail-title { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; color: var(--blue); margin-bottom: 10px; }
.cap-detail-desc { font-size: 1rem; color: var(--gray-text); line-height: 1.65; }

/* ── Comparison table ── */
.comp-table { min-width: 700px; }
.comp-header { display: grid; grid-template-columns: 180px 1fr 1fr; gap: 2px; margin-bottom: 4px; }
.comp-header div { background: var(--blue-dark); color: var(--white); padding: 12px 16px; font-weight: 700; font-size: 0.85rem; }
.comp-header div:first-child { border-radius: 12px 0 0 0; }
.comp-header div:last-child { border-radius: 0 12px 0 0; }
.comp-row { display: grid; grid-template-columns: 180px 1fr 1fr; gap: 2px; margin-bottom: 2px; transition: all 0.2s; }
.comp-row:hover { transform: scale(1.01); }
.comp-row .name-cell {
  padding: 14px 16px; font-weight: 700; font-size: 0.92rem;
  font-family: 'JetBrains Mono', monospace; transition: all 0.3s;
}
.comp-row .data-cell { padding: 14px 16px; font-size: 0.88rem; color: var(--gray-text); transition: all 0.3s; }

/* ── Autonomy bars ── */
.autonomy-row { display: grid; grid-template-columns: 140px 1fr; gap: 12px; align-items: center; margin-bottom: 14px; }
.autonomy-label { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; }
.autonomy-bars { display: flex; gap: 4px; }
.autonomy-bar {
  flex: 1; height: 28px; border-radius: 6px; transition: all 0.5s ease;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700; color: var(--white);
}

/* ── Conclusion ── */
.conclusion {
  background: linear-gradient(135deg, var(--blue-dark), var(--blue));
  border-radius: 20px; padding: 40px 32px; color: var(--white); text-align: center;
}
.conclusion h3 { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; margin-bottom: 20px; }
.conclusion-step { background: rgba(255,255,255,0.1); border-radius: 14px; padding: 20px 16px; }
.conclusion-step .icon { font-size: 1.6rem; margin-bottom: 8px; }
.conclusion-step .title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
.conclusion-step .desc { font-size: 0.85rem; opacity: 0.85; line-height: 1.5; }
.location-chip {
  display: inline-block; background: var(--lime); color: var(--blue-dark);
  padding: 6px 14px; border-radius: 8px; font-size: 0.78rem; font-weight: 700; margin: 4px;
}

/* ── Dark card variants ── */
.card-dark { background: linear-gradient(135deg, var(--blue-dark), var(--blue)); color: var(--white); }
.card-lime { background: var(--lime); color: var(--blue-dark); }
.inner-box-dark { background: rgba(255,255,255,0.1); padding: 10px 14px; border-radius: 10px; font-size: 0.85rem; margin-top: 12px; }
.inner-box-lime { background: rgba(0,0,0,0.08); padding: 10px 14px; border-radius: 10px; font-size: 0.85rem; margin-top: 12px; }

.mono { font-family: 'JetBrains Mono', monospace; }
.mb-40 { margin-bottom: 40px; }
.mb-30 { margin-bottom: 30px; }
.mb-20 { margin-bottom: 20px; }
.mb-16 { margin-bottom: 16px; }
.mt-40 { margin-top: 40px; }
.mt-20 { margin-top: 20px; }
.mt-16 { margin-top: 16px; }
.text-center { text-align: center; }

/* ── Vigi.AI tags ── */
.vigi-tag { display: inline-block; background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 10px; font-size: 0.82rem; margin: 4px; }

/* ── LLM warning ── */
.llm-warning { background: #FFF3E0; padding: 10px 16px; border-radius: 10px; font-size: 0.85rem; color: #E65100; font-weight: 500; margin-top: 14px; }

/* ── Caution tags ── */
.caution-tag { display: inline-block; background: rgba(26,58,110,0.07); color: var(--blue); padding: 10px 18px; border-radius: 10px; font-size: 0.88rem; font-weight: 700; margin: 4px; }

.process-item { font-size: 0.82rem; color: var(--gray-text); padding: 3px 0; }
.process-item:not(:last-child) { border-bottom: 1px solid var(--gray-light); }

/* ── IA adds list ── */
.ia-list-item { padding: 6px 0; font-size: 0.88rem; opacity: 0.9; }
.ia-list-item:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.1); }
</style>
</head>

function renderNav() {

function switchTab(id) {
  activeTab = id;

  renderNav();

function renderContent() {

function toggleEcosystem() {

  const orbit = document.getElementById("eco-orbit");
  matter.classList.toggle("expanded", ecoExpanded);
  hint.textContent = ecoExpanded ? "Clique para recolher" : "Clique para explorar";
  orbit.setAttribute("opacity", ecoExpanded ? "0.7" : "0.3");
  ECOSYSTEM.forEach((_, i) => {
    const node = document.getElementById(`eco-node-${i}`);
    if (ecoExpanded) {
      setTimeout(() => node.classList.add("visible"), i * 180);
    } else {
      node.classList.remove("visible");
    }
  });
}

function renderFlowSteps() {
  return FLOW_STEPS.map((s,i) => {
    const isActive = flowIdx === i;
    const isPast = flowIdx > i;
    return `
      <div class="flow-step">
        <div class="flow-node" style="opacity:${isActive?1:isPast?0.5:0.3};transform:${isActive?'scale(1.1)':'scale(1)'}">
          <div class="flow-circle ${isActive?'active':''}" style="background:${isActive?s.color:isPast?s.color+'40':'var(--gray-light)'};${isActive?'border-color:'+s.color+';box-shadow:0 4px 20px '+s.color+'50':''}">${s.icon}</div>
          <div class="flow-label" style="color:${isActive?s.color:'var(--gray-text)'}">${s.label}</div>
          <div class="flow-desc">${isActive?s.desc:''}</div>
        </div>
        ${i < FLOW_STEPS.length-1 ? `<div class="flow-connector" style="background:${isPast?'var(--lime)':'var(--gray-light)'}"></div>` : ''}
      </div>
    `;
  }).join("");
}

function startFlow() {
  if (flowTimer) clearInterval(flowTimer);
  flowIdx = -1;
  flowTimer = setInterval(() => {
    flowIdx = flowIdx >= FLOW_STEPS.length - 1 ? -1 : flowIdx + 1;
    const container = document.getElementById("flow-container");
    if (container) container.innerHTML = renderFlowSteps();
  }, 1800);
}

function selectCap(idx) {
  selectedCap = idx;
  // Update buttons
  document.querySelectorAll('.cap-btn').forEach((btn,i) => {
    btn.classList.toggle('active', i === idx);
  });
  // Update detail
  const detail = document.getElementById('cap-detail');
  if (detail) {
    detail.innerHTML = `
      <div class="cap-detail-icon">${CAPABILITIES[idx].icon}</div>
      <h4 class="cap-detail-title">${CAPABILITIES[idx].title}</h4>
      <p class="cap-detail-desc">${CAPABILITIES[idx].desc}</p>
    `;
  }
}
